# Tiny Tapeout project information
project:
  title:        "BF"      # Project title
  author:       "Joseph Wan and Joseph Mensah"      # Your name
  discord:      ".josephw & jjmensah"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "Runs programs in the BF language"      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     0       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 340x160 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 3x4 or 4x4

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_joseph_bf"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.v"
    - "bf.v"
    - "spi_ram.v"
    - "spi_master.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs -- BF input byte (read by the ',' instruction)
  ui[0]: "in[0]"
  ui[1]: "in[1]"
  ui[2]: "in[2]"
  ui[3]: "in[3]"
  ui[4]: "in[4]"
  ui[5]: "in[5]"
  ui[6]: "in[6]"
  ui[7]: "in[7]"

  # Outputs -- BF output byte (written by the '.' instruction)
  uo[0]: "out[0]"
  uo[1]: "out[1]"
  uo[2]: "out[2]"
  uo[3]: "out[3]"
  uo[4]: "out[4]"
  uo[5]: "out[5]"
  uo[6]: "out[6]"
  uo[7]: "out[7]"

  # Bidirectional pins -- SPI master to RP2040 RAM + I/O handshake
  uio[0]: "SPI CS"
  uio[1]: "SPI MOSI"
  uio[2]: "SPI MISO"
  uio[3]: "SPI SCK"
  uio[4]: "start"
  uio[5]: "out_valid"
  uio[6]: "in_valid"
  uio[7]: "in_ack"

# Do not change!
yaml_version: 6
